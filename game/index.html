<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>当代打工人精神状态消消乐</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 启动页 -->
    <div id="screen-start" class="screen active">
      <div class="start-bg"></div>
      <div class="start-content">
        <h1 class="game-title">当代打工人<br>精神状态消消乐</h1>
        <p class="game-subtitle">把职场怨气变成游戏动力，消除压力</p>
        <div class="tile-preview">
          <span class="preview-tile" data-type="coffee">☕</span>
          <span class="preview-tile" data-type="pie">🥞</span>
          <span class="preview-tile" data-type="pot">🍳</span>
          <span class="preview-tile" data-type="ppt">📉</span>
          <span class="preview-tile" data-type="read">✓✓</span>
        </div>
        <button id="btn-start" class="btn-primary">开始打工</button>
        <button id="btn-how" class="btn-secondary">离谱机制说明</button>
      </div>
    </div>

    <!-- 机制说明 -->
    <div id="screen-rules" class="screen overlay">
      <div class="modal">
        <h2>离谱机制一览</h2>
        <ul class="rules-list">
          <li><strong>☕ 心悸模式</strong>：连消 3 组冰美式，咖啡因过量！屏幕抖动，消除加速 200%</li>
          <li><strong>🍳 甩锅大法</strong>：把飞来横锅移到边缘，它会砸向隔壁格子，晕眩目标</li>
          <li><strong>🥞 天降大饼</strong>：一次凑齐 5 个大饼，老板虚影降临，狂点打破无休止会议</li>
          <li><strong>通关方式</strong>：7 个关卡各有目标，最终结局由你的打法决定——没有唯一正确答案</li>
        </ul>
        <button id="btn-rules-close" class="btn-primary">懂了，开干</button>
      </div>
    </div>

    <!-- 关卡选择 -->
    <div id="screen-levels" class="screen">
      <header class="level-header">
        <h2>选择关卡</h2>
        <p class="level-hint">通关路线开放 · 结局由你书写</p>
      </header>
      <div id="level-list" class="level-list"></div>
      <div id="stats-bar" class="stats-bar"></div>
    </div>

    <!-- 游戏主界面 -->
    <div id="screen-game" class="screen">
      <header class="game-header">
        <button id="btn-pause" class="btn-icon" aria-label="暂停">⏸</button>
        <div class="level-info">
          <span id="level-name" class="level-name"></span>
          <span id="level-goal" class="level-goal"></span>
        </div>
        <div class="score-box">
          <span id="score" class="score">0</span>
        </div>
      </header>

      <div id="status-badges" class="status-badges"></div>

      <div id="board-wrap" class="board-wrap">
        <canvas id="board-canvas"></canvas>
        <div id="board-overlay" class="board-overlay"></div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span>怨气值</span>
          <span id="stress-value">0</span>
        </div>
        <div class="progress-track">
          <div id="stress-bar" class="progress-fill stress"></div>
        </div>
      </div>

      <div id="moves-left" class="moves-left"></div>
    </div>

    <!-- 天降大饼 QTE -->
    <div id="screen-meeting" class="screen overlay hidden">
      <div class="meeting-bg"></div>
      <div class="boss-shadow">👔</div>
      <div class="meeting-content">
        <h2>无休止的会议</h2>
        <p class="meeting-text" id="meeting-text">这个需求的底层逻辑是……</p>
        <div class="tap-meter">
          <div id="tap-progress" class="tap-progress"></div>
        </div>
        <p class="tap-hint">狂点屏幕打破会议！</p>
        <div id="tap-count" class="tap-count">0 / 30</div>
      </div>
    </div>

    <!-- 关卡完成 -->
    <div id="screen-level-clear" class="screen overlay hidden">
      <div class="modal result-modal">
        <h2 id="clear-title">关卡完成！</h2>
        <p id="clear-desc"></p>
        <div id="clear-stats" class="clear-stats"></div>
        <button id="btn-next-level" class="btn-primary">下一关</button>
        <button id="btn-level-select" class="btn-secondary">关卡选择</button>
      </div>
    </div>

    <!-- 最终结局 -->
    <div id="screen-ending" class="screen overlay hidden">
      <div class="modal ending-modal">
        <div id="ending-badge" class="ending-badge"></div>
        <h2 id="ending-title"></h2>
        <p id="ending-desc"></p>
        <div id="ending-stats" class="ending-stats"></div>
        <button id="btn-replay" class="btn-primary">再来一局</button>
        <button id="btn-share" class="btn-secondary">复制战绩</button>
      </div>
    </div>

    <!-- 暂停 -->
    <div id="screen-pause" class="screen overlay hidden">
      <div class="modal">
        <h2>摸鱼暂停</h2>
        <button id="btn-resume" class="btn-primary">继续打工</button>
        <button id="btn-quit" class="btn-secondary">放弃本关</button>
      </div>
    </div>

    <!-- 音效提示 toast -->
    <div id="sfx-toast" class="sfx-toast"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
